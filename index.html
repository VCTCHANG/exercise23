<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Engineer-Designer Spec Implementation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 1. 畫面正中間 */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Roboto', sans-serif;
        }

        /* 外層卡片，用來定位按鈕 */
        .card-container {
            position: relative;
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 480px;
        }

        /* 按鈕：釘在右上角，嚴格遵守標註 h22, R8, 13px */
        .btn-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 10; /* 確保按鈕在圖片上方 */
            
            height: 22px;               /* size: h22 */
            border-radius: 8px;         /* radius: 8 */
            background-color: #ffffff;  /* background #ffffff */
            border: 1px solid #2f2f2f;  /* outline 1px #2f2f2f */
            color: #2f2f2f;             /* Color: #2f2f2f */
            font-size: 13px;            /* Roboto Regular 13px */
            
            padding: 0 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            outline: none;
            transition: 0.2s;
        }

        .btn-toggle:hover {
            background-color: #f6f6f6;
        }

        /* 2. 捲軸容器：圖片與資訊都在這裡面滑動 */
        .scroll-box {
            width: 100%;
            height: 380px;             /* 設定固定高度觸發捲軸 */
            overflow-y: scroll;        /* 強制顯示 Scrolling bar */
            border: 1px solid #eaeaea;
            box-sizing: border-box;
        }

        /* 圖片樣式 */
        .preview-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 資訊列表區塊 (預設隱藏，點擊按鈕後切換) */
        #infoSection {
            display: none;
            width: 100%;
        }

        /* 列表行樣式 */
        .info-row {
            display: flex;
            padding: 10px 15px;
            font-size: 13px;
            color: #707070;
            border-bottom: 1px solid #eaeaea;
        }

        /* 標註：list select color #e8f3ff */
        .info-row.highlight {
            background-color: #e8f3ff;
            border-bottom: 1px solid #cfddff;
        }

        .info-label {
            width: 90px;
            color: #2f2f2f;
            font-weight: bold;
        }

        /* 捲軸美化 */
        .scroll-box::-webkit-scrollbar {
            width: 8px;
        }
        .scroll-box::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="card-container">
    <button class="btn-toggle" onclick="toggleInfo()">查看資訊</button>

    <div class="scroll-box">
        <img src="https://picsum.photos/450/240" class="preview-img" alt="Product Image">
        
        <div id="infoSection">
            <div class="info-row highlight">
                <span class="info-label">名稱：</span> 20171012_1.jpg
            </div>
            <div class="info-row">
                <span class="info-label">修改日期：</span> 2017/10/12
            </div>
            <div class="info-row highlight">
                <span class="info-label">檔案大小：</span> 466.97 KB
            </div>
            <div class="info-row">
                <span class="info-label">路徑：</span> /Common Module/slice/checkbox
            </div>
            <div class="info-row highlight">
                <span class="info-label">解析度：</span> 1920 x 1080
            </div>
            <div class="info-row">
                <span class="info-label">色彩空間：</span> RGB
            </div>
            <div class="info-row">
                <span class="info-label">建立者：</span> Admin
            </div>
            <div class="info-row highlight">
                <span class="info-label">狀態：</span> 已發布
            </div>
        </div>
    </div>
</div>

<script>
    function toggleInfo() {
        var info = document.getElementById("infoSection");
        if (info.style.display === "none" || info.style.display === "") {
            info.style.display = "block";
        } else {
            info.style.display = "none";
        }
    }
</script>

</body>
</html>

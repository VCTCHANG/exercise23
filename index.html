<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Engineer-Designer Cooperation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 1. 讓整體容器在畫面正中間 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
        }

        .main-card {
            background: white;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 按鈕嚴格遵守標註：h22, R8, 13px, #2f2f2f */
        .btn-info {
            height: 22px;               /* size: h22 */
            border-radius: 8px;         /* radius: 8 */
            background-color: #ffffff;  /* background #ffffff */
            border: 1px solid #2f2f2f;  /* outline 1px #2f2f2f */
            color: #2f2f2f;             /* Color: #2f2f2f */
            font-size: 13px;            /* Roboto Regular 13px */
            padding: 0 15px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            outline: none;
        }

        .btn-info:hover {
            background-color: #f6f6f6;
        }

        /* 2. 讓圖片跟著一起滑動的捲軸容器 */
        #displayContainer {
            display: none;             /* 預設隱藏 */
            width: 460px;
            height: 350px;             /* 固定視窗高度 */
            border: 1px solid #eaeaea;
            overflow-y: scroll;        /* 產生捲軸 */
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .content-inner {
            width: 100%;
        }

        .preview-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 列表列樣式 (對齊設計稿標註) */
        .info-row {
            display: flex;
            padding: 10px 15px;
            font-size: 13px;
            color: #707070;
            border-bottom: 1px solid #eaeaea; /* list separator #eaeaea */
            background-color: #ffffff;
        }

        /* 標註：list select color #e8f3ff (藍色高亮行) */
        .info-row.highlight {
            background-color: #e8f3ff;
            border-bottom: 1px solid #cfddff;
        }

        .info-label {
            width: 100px;
            color: #2f2f2f;
            font-weight: bold;
        }

        /* 捲軸樣式美化 */
        #displayContainer::-webkit-scrollbar {
            width: 10px;
        }
        #displayContainer::-webkit-scrollbar-track {
            background: #f6f6f6;
        }
        #displayContainer::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <button class="btn-info" onclick="toggleDisplay()">查看資訊</button>

    <div id="displayContainer">
        <div class="content-inner">
            <img src="https://picsum.photos/450/240" class="preview-img" alt="Main Preview">
            
            <div class="info-row highlight">
                <span class="info-label">修改日期：</span> 2017/10/12
            </div>
            <div class="info-row">
                <span class="info-label">類型：</span> JPG 圖片
            </div>
            <div class="info-row highlight">
                <span class="info-label">大小：</span> 466.97 KB
            </div>
            <div class="info-row">
                <span class="info-label">路徑：</span> /Design/sample/img_01.jpg
            </div>
            <div class="info-row">
                <span class="info-label">解析度：</span> 1920 x 1080
            </div>
            <div class="info-row highlight">
                <span class="info-label">色彩空間：</span> sRGB
            </div>
            <div class="info-row">
                <span class="info-label">建立者：</span> Engineer_Gemini
            </div>
            <div class="info-row">
                <span class="info-label">版權資訊：</span> © 2026 QNAP Systems
            </div>
        </div>
    </div>
</div>

<script>
    function toggleDisplay() {
        var container = document.getElementById("displayContainer");
        if (container.style.display === "none" || container.style.display === "") {
            container.style.display = "block";
        } else {
            container.style.display = "none";
        }
    }
</script>

</body>
</html>

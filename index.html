<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Engineer-Designer Cooperation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f0f0;
            padding: 40px;
        }

        .card {
            background: white;
            width: 500px;
            padding: 20px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* 圖片區 */
        .preview-img {
            width: 450px;
            height: 240px;
            background-color: #eee;
            border: 1px solid #ccc;
            display: block;
            margin-bottom: 15px;
            object-fit: cover;
        }

        /* 按鈕嚴格遵守標註：h22, R8, 13px */
        .btn-check {
            height: 22px;               /* size: h22 */
            border-radius: 8px;         /* radius: 8 */
            background-color: #ffffff;  /* background #ffffff */
            border: 1px solid #2f2f2f;  /* outline 1px #2f2f2f */
            color: #2f2f2f;             /* Color: #2f2f2f */
            font-size: 13px;            /* Roboto Regular 13px */
            
            padding: 0 15px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .btn-check:hover {
            background-color: #f6f6f6;
        }

        /* 資訊清單區塊：強制顯示捲軸 */
        #infoList {
            display: none;             /* 預設隱藏 */
            width: 450px;
            height: 120px;             /* 固定高度以觸發捲軸 */
            border: 1px solid #eaeaea;
            overflow-y: scroll;        /* 強制顯示 Scrolling bar */
            background-color: #ffffff;
        }

        /* 列表列樣式 */
        .row {
            display: flex;
            padding: 8px 12px;
            font-size: 12px;
            color: #707070;
            border-bottom: 1px solid #eaeaea;
            align-items: center;
        }

        /* 標註：list select color #e8f3ff (選取/亮色行) */
        .row.blue {
            background-color: #e8f3ff;
            border-bottom: 1px solid #cfddff;
        }

        .label {
            width: 80px;
            color: #2f2f2f;
            font-weight: bold;
        }

        /* 捲軸美化 (可選，讓它更像圖片中的灰色捲軸) */
        #infoList::-webkit-scrollbar {
            width: 8px;
        }
        #infoList::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #infoList::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://picsum.photos/450/240" class="preview-img" alt="Main Preview">

    <button class="btn-check" onclick="showInfo()">查看資訊</button>

    <div id="infoList">
        <div class="row blue">
            <span class="label">修改日期：</span> 2017/10/12
        </div>
        <div class="row">
            <span class="label">類型：</span> JPG 檔案
        </div>
        <div class="row blue">
            <span class="label">大小：</span> 466.97 KB
        </div>
        <div class="row">
            <span class="label">路徑：</span> /Design/sample/img_01.jpg
        </div>
        <div class="row blue">
            <span class="label">解析度：</span> 1920 x 1080
        </div>
        <div class="row">
            <span class="label">建立者：</span> Designer_A
        </div>
        <div class="row blue">
            <span class="label">狀態：</span> 已審核
        </div>
    </div>
</div>

<script>
    function showInfo() {
        var box = document.getElementById("infoList");
        if (box.style.display === "none" || box.style.display === "") {
            box.style.display = "block";
        } else {
            box.style.display = "none";
        }
    }
</script>

</body>
</html>
